<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הורדת שירים מיוטיוב</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: left;
            direction: ltr;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        .progress-container {
            margin-top: 20px;
            display: none;
        }
        .progress-bar {
            width: 100%;
            background-color: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 20px;
            width: 0%;
            background-color: #007bff;
            transition: width 0.2s ease;
        }
        #status-text {
            margin-top: 10px;
            font-weight: bold;
            color: #555;
        }
        .proxy-note {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
            background-color: #fff3cd;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ffeeba;
        }
        .proxy-note a {
            color: #856404;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>הורדת שירים מיוטיוב</h1>
    <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=...">
    <button id="start-btn" onclick="startDownload()">הורד שיר</button>

    <div class="progress-container" id="progress-container">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="status-text">מתכונן...</div>
    </div>

    <div class="proxy-note">
        ⚠️ <strong>שים לב:</strong> אם מופיעה שגיאת חיבור, יש להיכנס פעם אחת ל-<a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank">קישור הזה</a> וללחוץ על הכפתור כדי להפעיל את הפרוקסי הזמני.
    </div>
</div>

<script>
    function startDownload() {
        const urlInput = document.getElementById('youtube-url').value.trim();
        const startBtn = document.getElementById('start-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const statusText = document.getElementById('status-text');

        if (!urlInput) {
            alert('אנא הכנס קישור תקין של יוטיוב');
            return;
        }

        // קידוד הקישור כדי שיתאים כפרמטר ב-URL
        const encodedUrl = encodeURIComponent(urlInput);
        const targetApiUrl = `https://api.kofiko.net/api/download?url=${encodedUrl}&format=mp3`;
        
        // שימוש בפרוקסי ציבורי לעקיפת חסימת CORS בדפדפן
        const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
        const apiUrl = proxyUrl + targetApiUrl;

        // שינוי מצב כפתור ותצוגת אלמנטים
        startBtn.disabled = true;
        progressContainer.style.display = 'block';
        progressFill.style.width = '0%';
        statusText.innerText = 'מתחבר לשרת דרך הפרוקסי...';

        // יצירת חיבור EventSource (זרם נתונים בזמן אמת)
        const eventSource = new EventSource(apiUrl);

        // האזנה לאירועי התקדמות (progress)
        eventSource.addEventListener('progress', function(event) {
            try {
                const data = JSON.parse(event.data);
                const progress = data.progress;
                progressFill.style.width = progress + '%';
                statusText.innerText = `מעבד... ${progress}%`;
            } catch (e) {
                console.error("שגיאה בפענוח הנתונים מהשרת", e);
            }
        });

        // האזנה לאירוע סיום (complete)
        eventSource.addEventListener('complete', function(event) {
            try {
                const data = JSON.parse(event.data);
                progressFill.style.width = '100%';
                statusText.innerText = 'העיבוד הסתיים! מוריד את הקובץ...';

                // סגירת החיבור כדי שלא יישאר פתוח ברקע
                eventSource.close();
                startBtn.disabled = false;

                // יצירת הורדה אוטומטית בדפדפן
                if (data.download_url) {
                    const a = document.createElement('a');
                    a.href = data.download_url;
                    a.download = ''; 
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            } catch (e) {
                statusText.innerText = 'שגיאה בקבלת קישור ההורדה.';
                eventSource.close();
                startBtn.disabled = false;
            }
        });

        // טיפול בשגיאות (למשל אם הפרוקסי חסום או השרת למטה)
        eventSource.onerror = function(err) {
            console.error("EventSource נתקל בשגיאה:", err);
            statusText.innerText = 'אירעה שגיאה בחיבור לשרת. ודא שהפעלת את הגישה לפרוקסי בקישור למטה.';
            eventSource.close();
            startBtn.disabled = false;
        };
    }
</script>

</body>
</html>
