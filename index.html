<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מוריד שירים מיוטיוב</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #ff0000;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: left;
        }
        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #cc0000;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }
        .loader {
            display: none;
            margin: 15px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>הורדת MP3 מיוטיוב</h1>
    <input type="text" id="youtubeUrl" placeholder="הדבק כאן את הקישור מיוטיוב (URL)...">
    <button id="downloadBtn" onclick="convertAndDownload()">הורד שיר</button>
    
    <div class="loader" id="loader"></div>
    <div class="status" id="statusMessage"></div>
</div>

<script>
async function convertAndDownload() {
    const urlInput = document.getElementById('youtubeUrl').value.trim();
    const statusMsg = document.getElementById('statusMessage');
    const loader = document.getElementById('loader');
    const btn = document.getElementById('downloadBtn');

    if (!urlInput) {
        statusMsg.style.color = 'red';
        statusMsg.innerText = 'אנא הכנס קישור תקין.';
        return;
    }

    statusMsg.innerText = 'שולח בקשה ועוקף חסימת דפדפן, אנא המתן...';
    statusMsg.style.color = '#333';
    loader.style.display = 'block';
    btn.disabled = true;

    // שימוש בפרוקסי ציבורי לעקיפת חסימת CORS של הדפדפן
    const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
    const targetUrl = 'https://cnv.cx/v2/converter';

    // המידע שנשלח ב-Body כולל ה-key
    const payload = {
        link: urlInput,
        format: 'mp3',
        audioBitrate: '320',
        videoQuality: '720',
        filenameStyle: 'pretty',
        vCodec: 'h264',
        key: 'YmFjMTRjMjdmMjU5MTAzZTNkYmM2MDdmMmVmN2FhZmJhN2JiNDEwNjAyZDliNTk3ZWZkZDkyNmIzODgxOTc4OHxNVGM0TWpFNU5UVTJOemt5TWc9PQ=='
    };

    try {
        const response = await fetch(proxyUrl + targetUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            throw new Error('השרת החזיר שגיאה: ' + response.status);
        }

        const data = await response.json();

        if (data.status === 'tunnel' && data.url) {
            statusMsg.style.color = 'green';
            statusMsg.innerText = 'ההורדה מתחילה!';
            
            const downloadLink = document.createElement('a');
            downloadLink.href = data.url;
            downloadLink.setAttribute('download', data.filename || 'audio.mp3');
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        } else {
            statusMsg.style.color = 'red';
            statusMsg.innerText = 'תשובה לא צפויה מהשרת: ' + JSON.stringify(data);
        }

    } catch (error) {
        console.error(error);
        statusMsg.style.color = 'red';
        statusMsg.innerText = 'שגיאה: לא ניתן היה לבצע את הבקשה. ודא שהפרוקסי פעיל או שהמפתח בתוקף.';
    } finally {
        loader.style.display = 'none';
        btn.disabled = false;
    }
}
</script>

</body>
</html>
